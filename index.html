<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Add-on</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #24292e; background: #fff; }
    .header { background: #24292e; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { color: #fff; font-size: 18px; font-weight: 600; }
    .lang-switcher { display: flex; gap: 4px; }
    .lang-btn { padding: 4px 12px; border: 1px solid #555; border-radius: 4px; background: transparent; color: #ccc; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .lang-btn.active { background: #fff; color: #24292e; border-color: #fff; font-weight: 600; }
    .lang-btn:hover:not(.active) { border-color: #aaa; color: #fff; }
    .content { max-width: 800px; margin: 40px auto; padding: 0 24px 60px; }
    .content h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-bottom: 16px; margin-top: 24px; }
    .content h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-bottom: 16px; margin-top: 24px; }
    .content h3 { font-size: 1.25em; margin-bottom: 16px; margin-top: 24px; }
    .content p { margin-bottom: 16px; }
    .content ul, .content ol { margin-bottom: 16px; padding-left: 2em; }
    .content li { margin-bottom: 4px; }
    .content pre { background: #f6f8fa; border-radius: 6px; padding: 16px; overflow: auto; margin-bottom: 16px; }
    .content code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 85%; }
    .content pre code { font-size: 14px; background: none; padding: 0; }
    .content :not(pre) > code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; }
    .content strong { font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Survey Add-on</h1>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="switchLang(this, 'en')">EN</button>
      <button class="lang-btn" onclick="switchLang(this, 'pt-br')">PT-BR</button>
    </div>
  </div>
  <div class="content" id="content"></div>

  <script>
    const docs = {
      en: `# Survey Add-on

## Usage

### 1. Include the Script
\`\`\`html
<script type="text/javascript" src="https://partenero-team.github.io/survey-addon/survey.js"><\/script>
\`\`\`

### 2. Initialize Partenero
\`\`\`javascript
// Create instance
const partenero = new Partenero(ambientId, templateId, options);

// Initialize with user data
partenero.init({
  email: userEmail,
  clientId: clientId,
  externalId: externalId
});
\`\`\`

### 3. Required Parameters
- **ambientId** (required): Environment ID
- **email** (required): User email
- **templateId** (required): Template ID
- **clientId OR externalId** (one required): Client ID or External ID

### 4. Options
\`\`\`javascript
{
  debug: true,           // Enable debug mode
  useDefaultStyle: true, // Apply built-in widget styles (default: true)
  containerId: 'my-div', // DOM element ID to mount survey into (default: body)
  colored_nps: true,     // Color NPS scale red/yellow/green (default: false)
  logFunction: fn        // Custom log function
}
\`\`\`

### 5. Methods
- \`partenero.init(userData)\` - Initialize survey
- \`partenero.destroy()\` - Clean up instance

### Demo
Open \`survey.html\` locally to see a working example with form validation.`,

      'pt-br': `# Survey Add-on

## Uso

### 1. Incluir o Script
\`\`\`html
<script type="text/javascript" src="https://partenero-team.github.io/survey-addon/survey.js"><\/script>
\`\`\`

### 2. Inicializar o Partenero
\`\`\`javascript
// Criar instância
const partenero = new Partenero(ambientId, templateId, options);

// Inicializar com dados do usuário
partenero.init({
  email: userEmail,
  clientId: clientId,
  externalId: externalId
});
\`\`\`

### 3. Parâmetros Obrigatórios
- **ambientId** (obrigatório): ID do ambiente
- **email** (obrigatório): Email do usuário
- **templateId** (obrigatório): ID do template
- **clientId OU externalId** (um obrigatório): ID do cliente ou ID externo

### 4. Opções
\`\`\`javascript
{
  debug: true,           // Habilitar modo debug
  useDefaultStyle: true, // Aplicar estilos padrão do widget (padrão: true)
  containerId: 'my-div', // ID do elemento DOM onde o survey será montado (padrão: body)
  colored_nps: true,     // Colorir escala NPS em vermelho/amarelo/verde (padrão: false)
  logFunction: fn        // Função de log personalizada
}
\`\`\`

### 5. Métodos
- \`partenero.init(userData)\` - Inicializar pesquisa
- \`partenero.destroy()\` - Limpar instância

### Demo
Abra \`survey.html\` localmente para ver um exemplo funcional com validação de formulário.`
    };

    function switchLang(btn, lang) {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('content').innerHTML = marked.parse(docs[lang]);
    }

    document.getElementById('content').innerHTML = marked.parse(docs['en']);
  </script>
</body>
</html>
